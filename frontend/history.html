<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Prediction History – AgriCrop</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="css/main.css" rel="stylesheet"/><link href="css/dark-mode.css" rel="stylesheet"/><link href="css/animations.css" rel="stylesheet"/>
</head>
<body>
<nav class="ag-navbar"><div class="d-flex align-items-center gap-3 w-100" style="padding:0 1.5rem;">
  <button class="d-lg-none btn-ag-icon" id="sidebar-toggle">☰</button>
  <a href="/" class="brand">🌱 AgriCrop</a>
  <div class="ms-auto d-flex gap-2 align-items-center">
    <button id="theme-toggle"><span class="toggle-icon sun-icon">☀️</span><span class="toggle-icon moon-icon">🌙</span></button>
    <a href="dashboard.html" class="btn-ag-secondary" style="font-size:0.82rem;padding:0.45rem 1rem;">← Dashboard</a>
  </div>
</div></nav>

<aside class="ag-sidebar" id="sidebar">
  <a href="dashboard.html" class="sidebar-link"><span class="link-icon">🏠</span> Dashboard</a>
  <a href="upload.html" class="sidebar-link"><span class="link-icon">🌿</span> Upload Leaf</a>
  <a href="soil-prediction.html" class="sidebar-link"><span class="link-icon">💧</span> Soil Prediction</a>
  <a href="map.html" class="sidebar-link"><span class="link-icon">🗺️</span> Disease Map</a>
  <a href="history.html" class="sidebar-link active"><span class="link-icon">📋</span> History</a>
  <a href="notifications.html" class="sidebar-link"><span class="link-icon">🔔</span> Notifications</a>
  <a href="profile.html" class="sidebar-link"><span class="link-icon">👤</span> Profile</a>
</aside>

<main class="ag-content-area ag-page">
  <div class="section-header mb-4">
    <div>
      <h2 class="section-title">📋 Prediction History</h2>
      <p class="section-subtitle"><span id="history-total">Loading...</span></p>
    </div>
    <div class="d-flex gap-2">
      <button id="export-csv-btn" class="btn-ag-secondary" style="font-size:0.82rem;">📥 Export CSV</button>
      <a href="upload.html" class="btn-ag-primary" style="font-size:0.82rem;">+ New Scan</a>
    </div>
  </div>

  <!-- Filters Row -->
  <div class="d-flex flex-wrap align-items-center gap-3 mb-4 p-3" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);">
    <div class="d-flex gap-2">
      <button class="history-filter-btn filter-chip active" data-type="all">All</button>
      <button class="history-filter-btn filter-chip" data-type="disease">🦠 Disease</button>
      <button class="history-filter-btn filter-chip" data-type="soil">💧 Soil</button>
    </div>
    <div class="input-wrapper ms-auto" style="max-width:280px;">
      <span class="input-icon">🔍</span>
      <input type="text" id="history-search" class="ag-input" placeholder="Search disease, crop..." style="padding-left:2.5rem;"/>
    </div>
  </div>

  <!-- Table -->
  <div id="history-container"></div>

  <!-- Pagination -->
  <div id="history-pagination" class="mt-3"></div>
</main>

<div id="ag-toast-container" class="ag-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="js/utils.js"></script><script src="js/firebase-config.js"></script><script src="js/api.js"></script>
<script src="js/auth.js"></script><script src="js/history.js"></script>
<script>
  document.getElementById("sidebar-toggle")?.addEventListener("click", () => {
    document.getElementById("sidebar")?.classList.toggle("open");
  });
  // Style filter buttons
  document.querySelectorAll(".history-filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".history-filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    });
  });
</script>
</body>
</html>
