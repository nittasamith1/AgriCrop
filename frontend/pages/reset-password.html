<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – AgriCrop</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="../assets/css/main.css" rel="stylesheet"/>
  <link href="../assets/css/dark-mode.css" rel="stylesheet"/>
  <link href="../assets/css/animations.css" rel="stylesheet"/>
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 2rem 1rem;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="hero-grid"></div>
  <div class="auth-card">
    <div class="ag-card-glass p-4 p-sm-5 animate-fade-up">
      <div class="text-center mb-4">
        <a href="/" class="brand mb-3 d-inline-block fs-3">🌱 AgriCrop</a>
        <h3 class="fw-bold text-gradient" style="font-family:'Space Grotesk',sans-serif;">Reset Password</h3>
        <p class="text-muted" style="font-size:0.85rem;">Enter your new password below to recover access to your account.</p>
      </div>

      <form id="reset-password-form">
        <div class="mb-3">
          <label for="password" class="form-label" style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);">New Password</label>
          <input type="password" class="form-control" id="password" required minlength="8" placeholder="••••••••"/>
        </div>
        <div class="mb-4">
          <label for="confirm-password" class="form-label" style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);">Confirm Password</label>
          <input type="password" class="form-control" id="confirm-password" required minlength="8" placeholder="••••••••"/>
        </div>
        
        <button type="submit" class="btn-ag-primary w-100 py-2" style="font-weight:600;">
          Reset Password
        </button>
      </form>

      <div class="text-center mt-4">
        <a href="login.html" class="text-gradient" style="font-size:0.85rem;font-weight:600;text-decoration:none;">
          ← Back to Login
        </a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/auth-config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  // Get token from URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  if (!token) {
    Utils.showToast("Invalid password reset link. Missing token.", "error");
    setTimeout(() => {
      window.location.href = "login.html";
    }, 3000);
  }

  document.getElementById("reset-password-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm-password").value;

    if (password !== confirmPassword) {
      Utils.showToast("Passwords do not match.", "error");
      return;
    }

    try {
      Utils.showLoading(true, "Updating password...");
      const res = await Auth.resetPassword(token, password);
      Utils.showLoading(false);
      
      if (res.success) {
        Utils.showToast("Password reset successfully. Redirecting to login...", "success");
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      } else {
        Utils.showToast(res.message, "error");
      }
    } catch (err) {
      Utils.showLoading(false);
      Utils.showToast(err.message || "Failed to reset password.", "error");
    }
  });
</script>
</body>
</html>
