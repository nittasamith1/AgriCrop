<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Management – AgriCrop Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="../../assets/css/main.css" rel="stylesheet"/><link href="../../assets/css/dark-mode.css" rel="stylesheet"/><link href="../../assets/css/animations.css" rel="stylesheet"/>
</head>
<body data-admin-page="users">
<nav class="ag-navbar"><div class="d-flex align-items-center gap-3 w-100" style="padding:0 1.5rem;">
  <button class="d-lg-none btn-ag-icon" id="sidebar-toggle">☰</button>
  <a href="/" class="brand" style="font-size:1.1rem;">🌱 AgriCrop <span style="font-size:0.7rem;color:var(--accent);font-weight:600;">ADMIN</span></a>
  <div class="ms-auto d-flex gap-2 align-items-center">
    <button id="theme-toggle"><span class="toggle-icon sun-icon">☀️</span><span class="toggle-icon moon-icon">🌙</span></button>
    <a href="#" onclick="Auth.logout()" class="btn-ag-secondary" style="font-size:0.82rem;padding:0.45rem 1rem;">🚪 Logout</a>
  </div>
</div></nav>

<aside class="ag-sidebar" id="sidebar">
  <div class="sidebar-section-label">Admin Panel</div>
  <a href="dashboard.html" class="sidebar-link"><span class="link-icon">📊</span> Dashboard</a>
  <a href="users.html" class="sidebar-link active"><span class="link-icon">👥</span> User Management</a>
  <a href="analytics.html" class="sidebar-link"><span class="link-icon">📈</span> Analytics</a>
  <a href="outbreaks.html" class="sidebar-link"><span class="link-icon">🔴</span> Disease Outbreaks</a>
  <a href="reports.html" class="sidebar-link"><span class="link-icon">📄</span> All Reports</a>
  <div class="sidebar-section-label">System</div>
  <a href="../map.html" class="sidebar-link"><span class="link-icon">🗺️</span> GIS Map</a>
</aside>

<main class="ag-content-area ag-page">
  <div class="section-header mb-4">
    <div>
      <h2 class="section-title">👥 User Management</h2>
      <p class="section-subtitle"><span id="users-total">Loading...</span></p>
    </div>
  </div>

  <!-- Filter + Search -->
  <div class="d-flex flex-wrap align-items-center gap-3 mb-4 p-3" style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);">
    <div class="d-flex gap-2">
      <button class="role-filter-btn filter-chip active" data-role="all">All Users</button>
      <button class="role-filter-btn filter-chip" data-role="farmer">🌾 Farmers</button>
      <button class="role-filter-btn filter-chip" data-role="admin">🔧 Admins</button>
    </div>
    <div class="input-wrapper ms-auto" style="max-width:280px;">
      <span class="input-icon">🔍</span>
      <input type="text" id="user-search" class="ag-input" placeholder="Search name, email..." style="padding-left:2.5rem;"/>
    </div>
  </div>

  <!-- Table -->
  <div class="ag-table-wrapper">
    <table class="ag-table">
      <thead>
        <tr>
          <th>User</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="users-table-body">
        <tr><td colspan="6" class="text-center py-4"><div class="ag-spinner mx-auto"></div></td></tr>
      </tbody>
    </table>
  </div>
  <div id="users-pagination" class="mt-3"></div>
</main>

<div id="ag-toast-container" class="ag-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<script src="../../assets/js/utils.js"></script><script src="../../assets/js/auth-config.js"></script><script src="../../assets/js/api.js"></script>
<script src="../../assets/js/auth.js"></script><script src="../../assets/js/admin.js"></script>
<script>
  document.getElementById("sidebar-toggle")?.addEventListener("click", () => {
    document.getElementById("sidebar")?.classList.toggle("open");
  });
  document.querySelectorAll(".role-filter-btn").forEach(b => b.addEventListener("click", () => {
    document.querySelectorAll(".role-filter-btn").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
  }));
</script>
</body>
</html>
