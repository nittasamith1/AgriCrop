<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile – AgriCrop</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="../assets/css/main.css" rel="stylesheet"/><link href="../assets/css/dark-mode.css" rel="stylesheet"/><link href="../assets/css/animations.css" rel="stylesheet"/>
</head>
<body>
<nav class="ag-navbar"><div class="d-flex align-items-center gap-3 w-100" style="padding:0 1.5rem;">
  <button class="d-lg-none btn-ag-icon" id="sidebar-toggle">☰</button>
  <a href="/" class="brand">🌱 AgriCrop</a>
  <div class="ms-auto d-flex gap-2">
    <button id="theme-toggle"><span class="toggle-icon sun-icon">☀️</span><span class="toggle-icon moon-icon">🌙</span></button>
    <a href="dashboard.html" class="btn-ag-secondary" style="font-size:0.82rem;padding:0.45rem 1rem;">← Dashboard</a>
  </div>
</div></nav>

<aside class="ag-sidebar" id="sidebar">
  <a href="dashboard.html" class="sidebar-link"><span class="link-icon">🏠</span> Dashboard</a>
  <a href="upload.html" class="sidebar-link"><span class="link-icon">🌿</span> Upload Leaf</a>
  <a href="soil-prediction.html" class="sidebar-link"><span class="link-icon">💧</span> Soil Prediction</a>
  <a href="map.html" class="sidebar-link"><span class="link-icon">🗺️</span> Disease Map</a>
  <a href="history.html" class="sidebar-link"><span class="link-icon">📋</span> History</a>
  <a href="notifications.html" class="sidebar-link"><span class="link-icon">🔔</span> Notifications</a>
  <a href="profile.html" class="sidebar-link active"><span class="link-icon">👤</span> Profile</a>
</aside>

<main class="ag-content-area ag-page">
  <div class="section-header mb-4">
    <h2 class="section-title">👤 My Profile</h2>
  </div>
  <div class="row g-4">
    <!-- Profile Card -->
    <div class="col-lg-4">
      <div class="ag-card text-center mb-4">
        <div style="width:80px;height:80px;border-radius:50%;background:var(--grad-primary);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;margin:0 auto 1rem;" id="avatar-circle">U</div>
        <h5 id="profile-name" style="color:var(--text-primary);">Loading...</h5>
        <div id="profile-email" class="text-muted" style="font-size:0.85rem;"></div>
        <div class="mt-2" id="profile-role-badge"></div>
        <div class="mt-3 d-flex justify-content-center gap-3" style="border-top:1px solid var(--border);padding-top:1rem;">
          <div><div class="fw-700" id="stat-preds" style="color:var(--text-primary);">0</div><div class="text-muted" style="font-size:0.75rem;">Scans</div></div>
          <div><div class="fw-700" id="stat-farms-count" style="color:var(--text-primary);">0</div><div class="text-muted" style="font-size:0.75rem;">Farms</div></div>
        </div>
      </div>

      <!-- Add Farm Card -->
      <div class="ag-card mb-4">
        <div class="chart-title mb-3">🌾 Add New Farm</div>
        <form id="add-farm-form">
          <div class="ag-form-group"><label class="ag-label">Farm Name</label><input type="text" id="farm-name" class="ag-input" placeholder="My Farm" required/></div>
          <div class="row g-2">
            <div class="col-6"><div class="ag-form-group"><label class="ag-label">Latitude</label><input type="number" id="farm-lat" class="ag-input" placeholder="18.5204" step="0.000001"/></div></div>
            <div class="col-6"><div class="ag-form-group"><label class="ag-label">Longitude</label><input type="number" id="farm-lon" class="ag-input" placeholder="73.8567" step="0.000001"/></div></div>
          </div>
          <div class="ag-form-group"><label class="ag-label">Area (Acres)</label><input type="number" id="farm-area" class="ag-input" placeholder="5" min="0.1" step="0.1"/></div>
          <div class="ag-form-group">
            <label class="ag-label">Soil Type</label>
            <select id="farm-soil" class="ag-input ag-select"><option value="loamy">Loamy</option><option value="sandy">Sandy</option><option value="clay">Clay</option><option value="silt">Silt</option><option value="peaty">Peaty</option></select>
          </div>
          <div class="ag-form-group"><label class="ag-label">State</label>
            <select id="farm-state" class="ag-input ag-select">
              <option value="Maharashtra">Maharashtra</option><option value="Karnataka">Karnataka</option>
              <option value="Tamil Nadu">Tamil Nadu</option><option value="Andhra Pradesh">Andhra Pradesh</option>
              <option value="Punjab">Punjab</option><option value="Haryana">Haryana</option>
              <option value="Gujarat">Gujarat</option><option value="Uttar Pradesh">Uttar Pradesh</option>
            </select>
          </div>
          <button type="button" id="get-farm-loc-btn" class="btn-ag-secondary mb-2" style="font-size:0.78rem;width:100%;">📍 Use My Location</button>
          <button type="submit" class="btn-ag-primary w-100" style="justify-content:center;">+ Add Farm</button>
        </form>
      </div>
    </div>

    <!-- Edit Profile + Farms List -->
    <div class="col-lg-8">
      <!-- Edit Profile -->
      <div class="ag-card mb-4">
        <div class="chart-title mb-3">✏️ Edit Profile</div>
        <form id="profile-form">
          <div class="row g-3">
            <div class="col-md-6">
              <div class="ag-form-group"><label class="ag-label">Full Name</label><input type="text" id="edit-name" class="ag-input"/></div>
            </div>
            <div class="col-md-6">
              <div class="ag-form-group"><label class="ag-label">Phone</label><div class="input-wrapper"><span class="input-icon">📱</span><input type="tel" id="edit-phone" class="ag-input" placeholder="+91 9876543210"/></div></div>
            </div>
            <div class="col-md-6">
              <div class="ag-form-group"><label class="ag-label">State</label>
                <select id="edit-state" class="ag-input ag-select">
                  <option value="">Select State</option>
                  <option>Maharashtra</option><option>Karnataka</option><option>Tamil Nadu</option>
                  <option>Andhra Pradesh</option><option>Punjab</option><option>Gujarat</option><option>Uttar Pradesh</option>
                </select>
              </div>
            </div>
            <div class="col-md-6">
              <div class="ag-form-group"><label class="ag-label">District</label><input type="text" id="edit-district" class="ag-input" placeholder="Enter district"/></div>
            </div>
          </div>
          <button type="submit" class="btn-ag-primary" style="justify-content:center;">💾 Save Changes</button>
        </form>
      </div>

      <!-- My Farms -->
      <div class="ag-card">
        <div class="chart-title mb-3">🌾 My Farms (<span id="farms-count">0</span>)</div>
        <div id="farms-list-profile"><div class="text-muted text-center py-3">Loading farms...</div></div>
      </div>
    </div>
  </div>
</main>

<div id="ag-toast-container" class="ag-toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/utils.js"></script><script src="../assets/js/auth-config.js"></script><script src="../assets/js/api.js"></script><script src="../assets/js/auth.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async () => {
  Auth.requireAuth();
  const user = Auth.getUser();
  if (user) populateProfile(user);
  loadFarmsForProfile();

  // Get location for farm
  document.getElementById("get-farm-loc-btn")?.addEventListener("click", () => {
    if (!navigator.geolocation) return Utils.showToast("Geolocation not supported.", "warning");
    navigator.geolocation.getCurrentPosition(pos => {
      document.getElementById("farm-lat").value = pos.coords.latitude.toFixed(6);
      document.getElementById("farm-lon").value = pos.coords.longitude.toFixed(6);
      Utils.showToast("Location captured!", "success");
    });
  });

  // Edit profile
  document.getElementById("profile-form")?.addEventListener("submit", async (e) => {
    e.preventDefault();
    const payload = {
      name:     document.getElementById("edit-name").value.trim() || undefined,
      phone:    document.getElementById("edit-phone").value.trim() || undefined,
      state:    document.getElementById("edit-state").value || undefined,
      district: document.getElementById("edit-district").value.trim() || undefined,
    };
    Object.keys(payload).forEach(k => payload[k] === undefined && delete payload[k]);
    try {
      await AgriCropAPI.auth.updateProfile(payload);
      Utils.showToast("Profile updated!", "success");
    } catch (e) { Utils.showToast(e.message || "Update failed.", "error"); }
  });

  // Add farm
  document.getElementById("add-farm-form")?.addEventListener("submit", async (e) => {
    e.preventDefault();
    const name = document.getElementById("farm-name").value.trim();
    const lat  = parseFloat(document.getElementById("farm-lat").value);
    const lon  = parseFloat(document.getElementById("farm-lon").value);
    if (!name) { Utils.showToast("Farm name is required.", "warning"); return; }
    const payload = {
      name,
      location: { latitude: lat || 20.5937, longitude: lon || 78.9629 },
      area_acres:  parseFloat(document.getElementById("farm-area").value) || 1,
      soil_type:   document.getElementById("farm-soil").value,
      state:       document.getElementById("farm-state").value,
      crop_types:  [],
      irrigation_type: "drip",
    };
    try {
      await AgriCropAPI.auth.addFarm(payload);
      Utils.showToast("Farm added!", "success");
      document.getElementById("add-farm-form").reset();
      loadFarmsForProfile();
    } catch (e) { Utils.showToast(e.message || "Failed to add farm.", "error"); }
  });

  document.getElementById("sidebar-toggle")?.addEventListener("click", () => {
    document.getElementById("sidebar")?.classList.toggle("open");
  });
});

function populateProfile(user) {
  document.getElementById("profile-name").textContent = user.name || "Farmer";
  document.getElementById("profile-email").textContent = user.email || "";
  document.getElementById("avatar-circle").textContent = (user.name || "U").charAt(0).toUpperCase();
  document.getElementById("edit-name").value = user.name || "";
  document.getElementById("edit-phone").value = user.phone || "";
  document.getElementById("edit-state").value = user.state || "";
  document.getElementById("edit-district").value = user.district || "";
  document.getElementById("stat-preds").textContent = user.total_predictions || 0;
  const roleEl = document.getElementById("profile-role-badge");
  if (roleEl) roleEl.innerHTML = `<span style="background:${user.role==='admin'?'rgba(245,158,11,0.15)':'rgba(22,163,74,0.15)'};color:${user.role==='admin'?'#f59e0b':'#22c55e'};padding:3px 10px;border-radius:20px;font-size:0.78rem;font-weight:600;">${user.role || 'farmer'}</span>`;
}

async function loadFarmsForProfile() {
  try {
    const res = await AgriCropAPI.auth.getMyFarms();
    const farms = res.farms || [];
    document.getElementById("farms-count").textContent = farms.length;
    document.getElementById("stat-farms-count").textContent = farms.length;
    const list = document.getElementById("farms-list-profile");
    if (!farms.length) { list.innerHTML = '<div class="text-muted text-center py-3">No farms added yet.</div>'; return; }
    list.innerHTML = farms.map(f => `
      <div class="d-flex align-items-center gap-3 p-3 mb-2" style="background:var(--bg-input);border-radius:10px;border:1px solid var(--border);">
        <div class="stat-icon green" style="width:44px;height:44px;border-radius:10px;font-size:1.1rem;">🌾</div>
        <div style="flex:1;min-width:0;">
          <div class="fw-600 truncate" style="font-size:0.9rem;">${f.name}</div>
          <small class="text-muted">${[f.district, f.state].filter(Boolean).join(", ") || "Location not set"}</small>
        </div>
        <div style="text-align:right;">
          <div style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);">${f.area_acres || 0} acres</div>
          <small class="text-muted">${f.soil_type || ""}</small>
        </div>
      </div>`).join("");
  } catch { Utils.showToast("Could not load farms.", "error"); }
}
</script>
</body>
</html>
