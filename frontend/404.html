<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found - AgriCrop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="/css/main.css" rel="stylesheet"/>
  <link href="/css/dark-mode.css" rel="stylesheet"/>
  <style>
    .error-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    .error-code { font-family: 'Space Grotesk', sans-serif; font-size: 8rem; font-weight: 800; line-height: 1; background: var(--grad-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1rem; }
    .error-title { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
    .error-subtitle { color: var(--text-secondary); max-width: 500px; margin: 0 auto 2rem; }
  </style>
</head>
<body>
  <section class="error-section">
    <div class="ag-container">
      <div class="error-code">404</div>
      <h1 class="error-title">Page Not Found</h1>
      <p class="error-subtitle">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
      <a href="/" class="btn-ag-primary">Back to Home</a>
    </div>
  </section>
</body>
</html>
