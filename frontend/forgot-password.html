<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password – AgriCrop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="css/main.css" rel="stylesheet"/><link href="css/dark-mode.css" rel="stylesheet"/><link href="css/animations.css" rel="stylesheet"/>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-base);">
  <div class="ag-card animate-fade-up" style="width:100%;max-width:440px;margin:2rem;">
    <div class="text-center mb-4">
      <div class="text-gradient" style="font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:800;">🌱</div>
      <h2 class="section-title mt-2">Reset Password</h2>
      <p class="text-muted" style="font-size:0.88rem;">Enter your email and we'll send a reset link</p>
    </div>
    <div class="ag-form-group">
      <label class="ag-label">Email Address</label>
      <div class="input-wrapper"><span class="input-icon">📧</span><input type="email" id="reset-email" class="ag-input" placeholder="farmer@example.com"/></div>
    </div>
    <div id="reset-msg" class="hidden mb-3" style="padding:0.75rem 1rem;border-radius:10px;font-size:0.85rem;"></div>
    <button id="reset-btn" class="btn-ag-primary w-100 mb-3" style="justify-content:center;padding:0.85rem;">📧 Send Reset Link</button>
    <div class="text-center"><a href="login.html" style="font-size:0.85rem;color:var(--text-muted);">← Back to Login</a></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="js/utils.js"></script><script src="js/firebase-config.js"></script><script src="js/auth.js"></script>
  <script>
  document.getElementById("reset-btn")?.addEventListener("click", async () => {
    const email = document.getElementById("reset-email").value.trim();
    const msgEl = document.getElementById("reset-msg");
    const btn = document.getElementById("reset-btn");
    if (!email) { msgEl.textContent = "Please enter your email."; msgEl.style.background = "rgba(220,38,38,0.1)"; msgEl.style.color = "#ef4444"; msgEl.style.border = "1px solid rgba(220,38,38,0.3)"; msgEl.classList.remove("hidden"); return; }
    btn.disabled = true;
    btn.innerHTML = '<span class="ag-spinner ag-spinner-sm"></span> Sending...';
    const res = await Auth.forgotPassword(email);
    msgEl.textContent = res.message;
    if (res.success) { msgEl.style.background = "rgba(22,163,74,0.1)"; msgEl.style.color = "#22c55e"; msgEl.style.border = "1px solid rgba(22,163,74,0.3)"; }
    else { msgEl.style.background = "rgba(220,38,38,0.1)"; msgEl.style.color = "#ef4444"; msgEl.style.border = "1px solid rgba(220,38,38,0.3)"; }
    msgEl.classList.remove("hidden");
    btn.disabled = false; btn.innerHTML = "📧 Send Reset Link";
  });
  </script>
</body>
</html>
